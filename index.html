<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="description" content="1VERSUS1 official landing page." />
  <title>1VERSUS1</title>
  <style>
    :root {
      --poster-w: min(100vw, calc(100dvh * 0.5625));
      --poster-h: min(100dvh, calc(100vw * 1.7777778));
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      overscroll-behavior: none;
      background: #050505;
      touch-action: manipulation;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100dvh;
      display: grid;
      place-items: center;
    }

    .stage {
      position: relative;
      width: var(--poster-w);
      height: var(--poster-h);
      max-width: 100vw;
      max-height: 100dvh;
      overflow: hidden;
      isolation: isolate;
      background: #050505;
      box-shadow: 0 0 60px rgba(0,0,0,.78);
    }

    .stage::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: url("web design(1).jpg");
      background-size: 100% 100%;
      background-position: center;
      background-repeat: no-repeat;
      z-index: -3;
    }

    /* Covers the old FUTSAL TOURNAMENT title and subtitle from the background art. */
    .title-cover {
      position: absolute;
      top: 6.4%;
      right: 4.5%;
      width: 57%;
      height: 15.2%;
      z-index: 2;
      pointer-events: none;
      background:
        radial-gradient(circle at 12% 50%, rgba(38,38,38,.96) 0 24%, rgba(16,16,16,.97) 42%, rgba(8,8,8,.98) 72%),
        linear-gradient(90deg, rgba(20,20,20,.98), rgba(7,7,7,.98));
      filter: blur(.2px);
    }

    /* Covers only the old ALL RIGHT RESERVED text on the background. */
    .reserved-cover {
      position: absolute;
      left: 2.2%;
      bottom: 1.35%;
      width: 21%;
      height: 2.1%;
      z-index: 2;
      pointer-events: none;
      background: #050505;
    }

    .button-grid {
      position: absolute;
      inset: 0;
      z-index: 10;
      pointer-events: none;
    }

    .btn-img {
      position: absolute;
      display: block;
      width: 32%;
      border: 0;
      background: transparent;
      text-decoration: none;
      cursor: pointer;
      transform-origin: center;
      pointer-events: auto;
      filter: drop-shadow(0 9px 0 rgba(0,0,0,.62)) drop-shadow(0 16px 20px rgba(0,0,0,.5));
      transition: transform .2s ease, filter .2s ease;
    }

    .btn-img img {
      display: block;
      width: 100%;
      height: auto;
      object-fit: contain;
      pointer-events: none;
      user-select: none;
    }

    .rulebook { left: 5.5%; top: 38.3%; transform: rotate(-7deg); }
    .wall     { left: 60.3%; top: 38.2%; transform: rotate(4deg); }
    .swiss    { left: 5.4%; top: 49.4%; transform: rotate(-6deg); }
    .lineup   { left: 60.5%; top: 49.7%; transform: rotate(4deg); }
    .booking  { left: 33.2%; top: 59.8%; width: 34%; transform: rotate(1deg); }

    .rulebook:hover, .rulebook:focus-visible { transform: translateY(-6px) scale(1.06) rotate(-9deg); }
    .wall:hover, .wall:focus-visible         { transform: translateY(-6px) scale(1.06) rotate(2deg); }
    .swiss:hover, .swiss:focus-visible       { transform: translateY(-6px) scale(1.06) rotate(-8deg); }
    .lineup:hover, .lineup:focus-visible     { transform: translateY(-6px) scale(1.06) rotate(2deg); }
    .booking:hover, .booking:focus-visible   { transform: translateY(-6px) scale(1.06) rotate(-1deg); }

    .btn-img:hover,
    .btn-img:focus-visible {
      filter: drop-shadow(0 12px 0 rgba(0,0,0,.68)) drop-shadow(0 0 16px rgba(230,39,44,.46));
      outline: none;
    }

    .btn-img:active { transform: scale(.96); }

    @media (max-aspect-ratio: 9/16) {
      .stage { width: 100vw; height: calc(100vw * 1.7777778); }
    }

    @media (min-aspect-ratio: 9/16) {
      .stage { width: calc(100dvh * .5625); height: 100dvh; }
    }

    @media (max-width: 600px) {
      body { display: block; }
      .stage {
        width: 100vw;
        height: 100dvh;
        max-width: none;
        max-height: none;
        box-shadow: none;
      }
      .stage::before { background-size: cover; }
      .btn-img { width: 32.5%; }
      .booking { width: 34.5%; }
    }
  </style>
</head>
<body>
  <main class="stage" aria-label="1VERSUS1 landing page">
    <div class="title-cover" aria-hidden="true"></div>
    <div class="reserved-cover" aria-hidden="true"></div>

    <nav class="button-grid" aria-label="Main links">
      <a class="btn-img rulebook" href="https://drive.google.com/file/d/1x6auYlvJqHG_QlkwKm8QA0lbtPGebv_m/view?usp=drivesdk" aria-label="Rulebook">
        <img src="rulebook-01.png" alt="Rulebook" />
      </a>
      <a class="btn-img wall" href="#wall-of-fame" aria-label="Wall of fame">
        <img src="wall of fame-01.png" alt="Wall of fame" />
      </a>
      <a class="btn-img swiss" href="#swiss-bracket" aria-label="Swiss bracket">
        <img src="swiss bracket-01.png" alt="Swiss bracket" />
      </a>
      <a class="btn-img lineup" href="https://1-versus-1-player-line-up.vercel.app" aria-label="Player line-up">
        <img src="player lineup-01.png" alt="Player line-up" />
      </a>
      <a class="btn-img booking" href="https://forms.gle/PM94wkZifZomJZ8E9" aria-label="Booking slot">
        <img src="booking slot-01.png" alt="Booking slot" />
      </a>
    </nav>
  </main>
</body>
</html>
