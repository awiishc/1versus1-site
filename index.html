<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="description" content="1VERSUS1 official landing page." />
  <title>1VERSUS1 | Futsal Tournament</title>
  <style>
    :root {
      --red: #e6272c;
      --white: #f3f3f3;
      --black: #050505;
      --poster-w: min(100vw, calc(100dvh * 0.5625));
      --poster-h: min(100dvh, calc(100vw * 1.7777778));
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      overscroll-behavior: none;
      background: #050505;
      touch-action: manipulation;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      color: var(--white);
    }

    .stage {
      position: relative;
      width: var(--poster-w);
      height: var(--poster-h);
      max-width: 100vw;
      max-height: 100dvh;
      overflow: hidden;
      isolation: isolate;
      background: #0b0b0b;
      box-shadow: 0 0 60px rgba(0,0,0,.78);
    }

    .stage::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: url("web design.jpg");
      background-size: 100% 100%;
      background-position: center;
      background-repeat: no-repeat;
      z-index: -3;
    }

    .stage::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(0,0,0,.12), transparent 25%, rgba(0,0,0,.24)),
        radial-gradient(circle at 52% 42%, rgba(255,255,255,.06), transparent 22%);
      mix-blend-mode: normal;
      z-index: -2;
    }

    .top-meta {
      position: absolute;
      top: 3.4%;
      left: 6.4%;
      right: 6.4%;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      font-size: clamp(9px, calc(var(--poster-w) * .023), 18px);
      font-weight: 700;
      letter-spacing: .02em;
      text-shadow: 0 3px 14px rgba(0,0,0,.75);
      z-index: 4;
      pointer-events: none;
    }

    .logo {
      position: absolute;
      top: 3.1%;
      left: 50%;
      transform: translateX(-50%);
      width: 18%;
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 0 7px rgba(255,255,255,.18));
      z-index: 5;
      pointer-events: none;
    }

    .headline {
      position: absolute;
      top: 8.2%;
      right: 8.3%;
      width: 50%;
      z-index: 5;
      text-align: left;
      pointer-events: none;
    }

    .headline h1 {
      margin: 0;
      color: #df2028;
      font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
      font-weight: 900;
      font-size: clamp(30px, calc(var(--poster-w) * .116), 122px);
      line-height: .83;
      letter-spacing: -.055em;
      text-transform: uppercase;
      text-shadow: 0 5px 0 rgba(0,0,0,.38), 0 14px 26px rgba(0,0,0,.5);
    }

    .headline p {
      margin: 3.5% 0 0;
      max-width: 84%;
      color: #ffffff;
      font-size: clamp(8px, calc(var(--poster-w) * .027), 24px);
      line-height: 1.22;
      font-weight: 700;
      font-style: italic;
      text-align: right;
      text-shadow: 0 3px 12px rgba(0,0,0,.88);
    }

    .button-grid {
      position: absolute;
      top: 40.2%;
      left: 12.5%;
      width: 75%;
      min-height: 33%;
      z-index: 10;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: repeat(3, auto);
      column-gap: 10.5%;
      row-gap: 5.5%;
      align-items: center;
      justify-items: center;
    }

    .btn-img {
      display: block;
      width: 100%;
      max-width: 270px;
      aspect-ratio: 1 / 1;
      border: 0;
      background: transparent;
      text-decoration: none;
      cursor: pointer;
      transform-origin: center;
      filter: drop-shadow(0 10px 0 rgba(0,0,0,.58)) drop-shadow(0 16px 20px rgba(0,0,0,.55));
    }

    .btn-img img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
    }

    .btn-img:focus-visible { outline: 2px solid rgba(255,255,255,.75); outline-offset: 4px; }

    .swiss { grid-column: 1; grid-row: 1; transform: rotate(-5deg); }
    .lineup { grid-column: 2; grid-row: 1; transform: rotate(4deg); }
    .rulebook { grid-column: 1; grid-row: 2; transform: rotate(-3deg); }
    .wall { grid-column: 2; grid-row: 2; transform: rotate(3deg); }
    .booking { grid-column: 1 / 3; grid-row: 3; width: 56%; max-width: 250px; transform: rotate(1deg); }

    .footer .center { text-align: center; }
    .footer .red { color: #e6272c; }

    @media (max-aspect-ratio: 9/16) {
      .stage { width: 100vw; height: calc(100vw * 1.7777778); }
    }

    @media (min-aspect-ratio: 9/16) {
      .stage { width: calc(100dvh * .5625); height: 100dvh; }
    }

    @media (max-width: 520px) {
      .button-grid {
        top: 40.4%;
        left: 10.8%;
        width: 78.4%;
        column-gap: 6%;
        row-gap: 3.8%;
      }
      .booking { width: 60%; }
      .headline { right: 7%; width: 52%; }
    }

    @media (min-width: 900px) {
      .stage { box-shadow: 0 0 90px rgba(0,0,0,.85), 0 0 0 1px rgba(255,255,255,.05); }
    }
  </style>
</head>
